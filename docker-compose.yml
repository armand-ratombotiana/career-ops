services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      HOST: 0.0.0.0
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./output:/app/output
      - ./interview-prep:/app/interview-prep
      - ./jds:/app/jds
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    depends_on:
      - api
    restart: unless-stopped
