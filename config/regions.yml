# Regional Job Market Configuration
# Maps countries/regions to keywords for targeted job searches.
# Used by scan-portals.mjs --region and search-region.mjs

regions:
  # ─── Middle East & North Africa ───
  middle-east:
    label: "Middle East & North Africa"
    countries:
      - "UAE"
      - "Dubai"
      - "Abu Dhabi"
      - "Qatar"
      - "Doha"
      - "Saudi Arabia"
      - "Riyadh"
      - "Jeddah"
      - "Bahrain"
      - "Kuwait"
      - "Oman"
      - "Muscat"
      - "Egypt"
      - "Cairo"
      - "Jordan"
      - "Amman"
      - "Lebanon"
      - "Beirut"
      - "Morocco"
      - "Casablanca"
      - "Tunisia"
      - "Algeria"
      - "Israel"
      - "Tel Aviv"
    keywords: "UAE OR Dubai OR Qatar OR Saudi Arabia OR Riyadh OR Bahrain OR Kuwait OR Oman OR Egypt OR MENA"
    job_sites:
      - "linkedin.com/jobs"
      - "bayt.com"
      - "naukrigulf.com"
      - "gulftalent.com"
      - "indeed.ae"

