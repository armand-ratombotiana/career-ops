version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: career_ops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d career_ops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    volumes:
      - ./api:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:dev@postgres:5432/career_ops
      - REDIS_URL=redis://redis:6379
      - WEB_URL=http://localhost:3000
      # You must add these to your local .env or pass them in:
      # - CLERK_SECRET_KEY
      # - CLERK_JWT_PUBLIC_KEY
      # - ANTHROPIC_API_KEY
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      # Use a simple dev setup rather than the full prod Dockerfile (which we haven't built yet)
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3002
      # You must add these to your local .env or pass them in:
      # - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
      # - CLERK_SECRET_KEY
    depends_on:
      - api

volumes:
  pgdata:
